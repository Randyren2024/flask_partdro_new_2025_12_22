edition: 3.0.0
name: partdro-app
access: default

resources:
  partdro-service:
    component: fc
    props:
      region: cn-hongkong
      service:
        name: partdro-service
        description: 'Flask application for Partdro'
        internetAccess: true
        role: 'acs:ram::${ALIYUN_ACCOUNT_ID}:role/AliyunFCDefaultRole' # You might need to update this if you have a custom role
      function:
        name: partdro-function
        description: 'Main Flask Function'
        runtime: custom-container
        caPort: 9000
        cpu: 1.0
        memorySize: 1024
        timeout: 60
        customContainerConfig:
          # This image URI should be updated after you push to ACR
          # For now, it's a placeholder. 
          # You can build locally and push, then update this.
          image: registry.cn-hongkong.aliyuncs.com/partdro-namespace/partdro-flask:latest
        environmentVariables:
          FLASK_ENV: production
          # Secrets are referenced from environment or s config
          # It is recommended to manage sensitive keys in FC console or via s config
          SUPABASE_URL: ${env(SUPABASE_URL)}
          SUPABASE_KEY: ${env(SUPABASE_KEY)}
          DEEPSEEK_API_KEY: ${env(DEEPSEEK_API_KEY)}
          ADMIN_ACCESS_KEY: ${env(ADMIN_ACCESS_KEY)}
          FLASK_SECRET_KEY: ${env(FLASK_SECRET_KEY)}
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
