<!DOCTYPE html>
<html lang="{{ get_locale() if get_locale else 'en' }}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}partdro | Precision Parts. Global Link.{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 定义“科技感”VI的专属颜色和配置
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        deepNavy: '#001A4D',       // 核心深色背景
                        darkCurrent: '#00265F',    // 次要深色背景（卡片等）
                        cyberCyan: '#00E5FF',      // 能量强调色（按钮、高光）
                        quantumSilver: '#C0C5CE',  // 次要文本色
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(0, 229, 255, 0.5), 0 0 5px rgba(0, 229, 255, 0.3)', // 青色霓虹光晕
                    }
                }
            }
        }
    </script>
    <style>
        /* 【重要】背景纹理占位符 
           请准备一张深色的、低透明度的电路板线条图案 (png/svg)，
           并替换下方的 URL。
        */
        .bg-circuit-pattern {
            background-image: url('path/to/your/dark-circuit-pattern.png'); 
            background-repeat: repeat;
            background-blend-mode: overlay;
        }
        
        /* 用于磨砂玻璃效果的辅助类 */
        .glass-card {
            background: rgba(0, 38, 95, 0.6); /* darkCurrent with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.1);
        }
        
        /* 表单输入框聚焦样式 (from contact.html) */
        .tech-input:focus {
            border-color: #00E5FF;
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.3);
            outline: none;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-deepNavy text-quantumSilver font-sans leading-relaxed">

    {% include 'header.html' %}

    {% block content %}
    {% endblock %}

    {% include 'footer.html' %}

    {% block scripts %}{% endblock %}
</body>
</html>
